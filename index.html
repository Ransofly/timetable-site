<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Timetable</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root {
    --bg: #0b1220;
    --card: #111a2e;
    --text: #ffffff;
    --accent: #38bdf8;
}

.light {
    --bg: #f5f7fb;
    --card: #ffffff;
    --text: #111827;
    --accent: #2563eb;
}

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s ease;
}

header {
    padding: 20px;
    text-align: center;
    background: var(--card);
    position: sticky;
    top: 0;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

h1 {
    margin: 0;
    font-size: 22px;
}

.buttons {
    margin-top: 10px;
}

button {
    border: none;
    padding: 10px 16px;
    margin: 5px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.2s;
}

.btn {
    background: var(--accent);
    color: white;
}

.btn:hover {
    transform: scale(1.05);
}

.container {
    max-width: 600px;
    margin: auto;
    padding: 15px;
}

.card {
    background: var(--card);
    padding: 15px;
    margin: 12px 0;
    border-radius: 14px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.2);
    transform: translateY(10px);
    opacity: 0;
    animation: pop 0.3s forwards;
}

@keyframes pop {
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

.toggle {
    background: #22c55e;
    color: white;
}
</style>
</head>

<body>

<header>
<h1>📚 My Timetable</h1>

<div class="buttons">
<button class="btn" onclick="showWeek('A')">Week A</button>
<button class="btn" onclick="showWeek('B')">Week B</button>
<button class="toggle" onclick="toggleTheme()">Light/Dark</button>
</div>
</header>

<div class="container" id="timetable"></div>

<script>
const weekA = [
"Period 1 — Maths",
"Period 2 — English",
"Period 3 — Science",
"Period 4 — History",
"Period 5 — PE"
];

const weekB = [
"Period 1 — Science",
"Period 2 — Maths",
"Period 3 — Geography",
"Period 4 — English",
"Period 5 — Art"
];

function showWeek(week) {
    const container = document.getElementById("timetable");
    container.innerHTML = "";

    let data = week === "A" ? weekA : weekB;

    data.forEach((item, i) => {
        let div = document.createElement("div");
        div.className = "card";
        div.style.animationDelay = (i * 0.05) + "s";
        div.innerText = item;
        container.appendChild(div);
    });
}

function toggleTheme() {
    document.body.classList.toggle("light");
}

// default
showWeek("A");
</script>

</body>
</html>
