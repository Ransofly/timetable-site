<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flynn Timetable</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#0e0f12;
  --panel:#15171c;
  --card:#1c1f26;
  --text:#ffffff;
  --muted:#9aa0a6;
  --accent:#4f9cff;
  --good:#22c55e;
  --border:#2a2d35;
}

body.light{
  --bg:#f4f6f8;
  --panel:#ffffff;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --accent:#2563eb;
  --good:#16a34a;
  --border:#e5e7eb;
}

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:var(--bg);
  color:var(--text);
}

.header{
  padding:14px 18px;
  background:var(--panel);
  border-bottom:1px solid var(--border);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.title{
  font-weight:700;
}

.small{
  color:var(--muted);
  font-size:13px;
}

.wrap{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  padding:12px;
}

.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:12px;
  padding:12px;
}

.big{
  font-size:18px;
  font-weight:700;
}

.bar{
  height:6px;
  background:#2a2d35;
  border-radius:10px;
  overflow:hidden;
  margin-top:8px;
}

.fill{
  height:100%;
  background:var(--good);
  width:0%;
  transition:width 0.3s linear;
}

table{
  width:100%;
  border-collapse:collapse;
}

td{
  padding:8px;
  border-bottom:1px solid var(--border);
  font-size:13px;
}

.active{
  background:rgba(34,197,94,0.08);
  border-left:3px solid var(--good);
}

button{
  background:var(--accent);
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
  <div>
    <div class="title">📚 Flynn Timetable</div>
    <div class="small" id="meta"></div>
  </div>

  <div>
    <button onclick="toggleTheme()">Theme</button>
    <button onclick="toggleClock()">12/24h</button>
  </div>
</div>

<div class="wrap">

  <div class="card">
    <div class="small">Current</div>
    <div class="big" id="current">---</div>
    <div class="small" id="countdown"></div>
    <div class="bar"><div class="fill" id="progress"></div></div>
  </div>

  <div class="card">
    <div class="small">Next</div>
    <div class="big" id="next">---</div>
  </div>

  <div class="card" style="grid-column:span 2;">
    <div class="small">Today</div>
    <table id="table"></table>
  </div>

</div>

<script>

/* ================= SETTINGS ================= */

let use24h = localStorage.getItem("clock") === "24";
if(localStorage.getItem("theme")==="light") document.body.classList.add("light");

/* ================= TIMETABLE DATA (UNCHANGED) ================= */

const days = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];

const data = {
Mon:["History","Drama","Maths","Design","Science","English"],
Tue:["Design","Design","Soccer","Soccer","English","RS"],
Wed:["History","RS","Maths","Drama","French","French"],
Thu:["Maths","Maths","English","History","Drama","PE"],
Fri:["History","Design","Drama","Science","Music","French"]
};

/* ================= NORMAL + WED TIMES ================= */

const normal = [
{start:500,end:555},
{start:560,end:615},
{start:615,end:635}, // recess
{start:635,end:660}, // mentor
{start:660,end:715},
{start:715,end:770},
{start:770,end:810}, // lunch
{start:810,end:865},
{start:865,end:920}
];

const wed = [
{start:500,end:555},
{start:555,end:605},
{start:605,end:625},
{start:625,end:675},
{start:675,end:725},
{start:725,end:785},
{start:785,end:830},
{start:830,end:880},
{start:880,end:920}
];

/* ================= WEEK AUTO ================= */

function getWeek(){
  const start=new Date("2025-01-01");
  const diff=Math.floor((new Date()-start)/86400000);
  return diff%2===0?"A":"B";
}

/* ================= DAY ================= */

function getDay(){
  return days[new Date().getDay()];
}

/* ================= ENGINE ================= */

function nowMins(){
  let d=new Date();
  return d.getHours()*60+d.getMinutes()+d.getSeconds()/60;
}

function format(mins){
  let h=Math.floor(mins/60);
  let m=Math.floor(mins%60);
  if(!use24h){
    let am=h>=12?"PM":"AM";
    h=h%12||12;
    return `${h}:${m.toString().padStart(2,"0")} ${am}`;
  }
  return `${h}:${m.toString().padStart(2,"0")}`;
}

/* ================= CORE LOGIC ================= */

function getState(){

  const m=nowMins();
  const schedule = getDay()==="Wed"?wed:normal;

  for(let i=0;i<schedule.length;i++){

    if(m>=schedule[i].start && m<schedule[i].end){

      let progress=(m-schedule[i].start)/(schedule[i].end-schedule[i].start)*100;

      return {
        type:"current",
        index:i,
        progress,
        remaining:schedule[i].end-m
      };
    }

    if(m<schedule[i].start){
      return {
        type:"next",
        index:i
      };
    }
  }

  return {type:"end"};
}

/* ================= UI ================= */

function update(){

  const d=new Date();

  document.getElementById("meta").innerText=
    `Week ${getWeek()} • ${getDay()} • ${d.toLocaleDateString()}`;

  const state=getState();

  const schedule=getDay()==="Wed"?wed:normal;

  if(state.type==="current"){
    document.getElementById("current").innerText=
      data[getDay()][state.index] || "Event";

    document.getElementById("countdown").innerText=
      Math.floor(state.remaining)+" min left";

    document.getElementById("progress").style.width=
      state.progress+"%";

    if(schedule[state.index+1]){
      document.getElementById("next").innerText=
        data[getDay()][state.index+1] || "Next Event";
    }
  }

  if(state.type==="next"){
    document.getElementById("current").innerText="Break / Transition";
    document.getElementById("next").innerText=
      data[getDay()][state.index] || "Next";
  }

  if(state.type==="end"){
    document.getElementById("current").innerText="School Finished";
    document.getElementById("next").innerText="—";
    document.getElementById("progress").style.width="0%";
  }

}

/* ================= TABLE ================= */

function render(){

  const t=document.getElementById("table");
  t.innerHTML="";

  const d=getDay();
  if(!data[d]) return;

  data[d].forEach((x,i)=>{
    let row=document.createElement("tr");
    row.innerHTML=`<td>P${i+1}</td><td>${x}</td>`;
    t.appendChild(row);
  });
}

/* ================= SETTINGS ================= */

function toggleTheme(){
  document.body.classList.toggle("light");
  localStorage.setItem("theme",document.body.classList.contains("light")?"light":"dark");
}

function toggleClock(){
  use24h=!use24h;
  localStorage.setItem("clock",use24h?"24":"12");
}

/* ================= START ================= */

render();
update();
setInterval(update,1000);

</script>

</body>
</html>
