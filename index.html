<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flynn Timetable</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:#0e0f12;
  color:white;
}

/* HEADER */
.header{
  padding:15px;
  background:#151820;
  border-bottom:1px solid #222;
}

.title{
  font-size:18px;
  font-weight:700;
}

.sub{
  color:#aaa;
  font-size:13px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
  padding:15px;
}

/* CARD */
.card{
  background:#161922;
  padding:12px;
  border-radius:10px;
  border:1px solid #222;
}

.current{
  border-left:4px solid #00ff88;
  background:#1a2a1f;
}

/* TIMETABLE TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

td,th{
  padding:8px;
  border-bottom:1px solid #222;
  font-size:13px;
}

.highlight{
  background:#1a2a1f;
  border-left:4px solid #00ff88;
}
</style>
</head>

<body>

<div class="header">
  <div class="title">📚 Flynn Timetable</div>
  <div class="sub" id="info">Loading...</div>
</div>

<div class="grid">

  <div class="card current">
    <div><b>Current Class:</b> <span id="current">---</span></div>
    <div><b>Next:</b> <span id="next">---</span></div>
    <div id="countdown"></div>
  </div>

  <div class="card">
    <b>Today's Timetable</b>
    <table id="table"></table>
  </div>

</div>

<script>

/* ================= TIMETABLE DATA ================= */

const schedule = [
{start:8*60+20,end:9*60+15,label:"P1"},
{start:9*60+20,end:10*60+15,label:"P2"},
{start:10*60+35,end:11*60+0,label:"P3"},
{start:11*60+0,end:11*60+55,label:"P4"},
{start:12*60+50,end:13*60+30,label:"P5"},
{start:13*60+30,end:14*60+25,label:"P6"}
];

/* YOUR REAL DATA */
const data = {
Mon:["History","Drama","Maths","Design","Science","English"],
Tue:["Design","Design","Soccer","Soccer","English","RS"],
Wed:["History","RS","Maths","Drama","French","French"],
Thu:["Maths","Maths","English","History","Drama","PE"],
Fri:["History","Design","Drama","Science","Music","French"]
};

/* ================= AUTO WEEK ================= */

function getWeek(){
  const start = new Date("2025-01-01");
  const now = new Date();
  const diff = Math.floor((now-start)/(1000*60*60*24));
  return diff % 2 === 0 ? "A":"B";
}

/* ================= DAY ================= */

function getDay(){
  return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date().getDay()];
}

/* ================= CORE ENGINE ================= */

function update(){

  const now = new Date();
  const mins = now.getHours()*60 + now.getMinutes();
  const sec = now.getSeconds();

  const day = getDay();

  let current="Free";
  let next="End";
  let left="";

  for(let i=0;i<schedule.length;i++){
    if(mins>=schedule[i].start && mins<=schedule[i].end){
      current = schedule[i].label;

      let remaining = (schedule[i].end*60) - (mins*60+sec);
      left = Math.floor(remaining/60)+" min left";

      if(schedule[i+1]) next = schedule[i+1].label;
    }
  }

  document.getElementById("current").innerText=current;
  document.getElementById("next").innerText=next;
  document.getElementById("countdown").innerText=left;

  document.getElementById("info").innerText=
    `Week ${getWeek()} • ${day} • ${now.toDateString()}`;
}

/* ================= TABLE ================= */

function render(){

  const table=document.getElementById("table");
  table.innerHTML="";

  const day=getDay();
  const subjects=data[day];

  if(!subjects) return;

  subjects.forEach((sub,i)=>{

    let row=document.createElement("tr");

    row.innerHTML=`
      <td>P${i+1}</td>
      <td>${sub}</td>
      <td>${schedule[i]?.start?format(schedule[i].start):""}</td>
    `;

    table.appendChild(row);
  });
}

function format(m){
  let h=Math.floor(m/60);
  let mm=m%60;
  return `${h}:${mm.toString().padStart(2,"0")}`;
}

/* ================= INIT ================= */

render();
update();
setInterval(update,1000);

</script>

</body>
</html>
