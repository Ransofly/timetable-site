<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Flynn Timetable</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap');

:root{
  --bg:#0f0f10;
  --panel:#1b1b1d;
  --card:#232326;
  --text:#ffffff;
  --muted:#a1a1aa;
  --accent:#4f9cff;
  --border:#2a2a2e;
}

body{
  margin:0;
  font-family:Segoe UI, sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
}

/* LEFT SIDEBAR (WINDOWS STYLE) */
.sidebar{
  width:240px;
  height:100vh;
  background:var(--panel);
  border-right:1px solid var(--border);
  padding:20px;
  box-sizing:border-box;
  position:fixed;
}

.logo{
  font-size:18px;
  font-weight:700;
  margin-bottom:20px;
}

.nav{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.tab{
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  color:var(--muted);
  transition:0.2s;
}

.tab:hover{
  background:#2a2a2e;
  color:white;
}

.tab.active{
  background:var(--accent);
  color:white;
}

/* MAIN AREA */
.main{
  margin-left:240px;
  padding:20px;
  width:100%;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.time{
  font-size:22px;
  font-weight:700;
}

.date{
  color:var(--muted);
  font-size:13px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

/* CARDS (WINDOWS STYLE) */
.card{
  background:var(--card);
  border:1px solid var(--border);
  border-radius:10px;
  padding:15px;
}

.title{
  font-size:13px;
  color:var(--muted);
  margin-bottom:10px;
}

.big{
  font-size:18px;
  font-weight:700;
}

.lesson{
  display:flex;
  justify-content:space-between;
  padding:8px 0;
  border-bottom:1px solid var(--border);
}

.highlight{
  background:#2a2a2e;
  border-left:3px solid var(--accent);
  padding-left:8px;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">📚 Flynn Timetable</div>

  <div class="nav">
    <div class="tab active" onclick="show('today')">Today</div>
    <div class="tab" onclick="show('weekA')">Week A</div>
    <div class="tab" onclick="show('weekB')">Week B</div>
    <div class="tab" onclick="show('full')">Full View</div>
  </div>
</div>

<div class="main">

  <div class="topbar">
    <div>
      <div class="time" id="time">--:--</div>
      <div class="date" id="date">---</div>
    </div>
  </div>

  <div class="grid">

    <div class="card">
      <div class="title">Current Class</div>
      <div class="big" id="current">---</div>
      <div id="left"></div>
    </div>

    <div class="card">
      <div class="title">Next Class</div>
      <div class="big" id="next">---</div>
    </div>

    <div class="card" style="grid-column:span 2;">
      <div class="title">Today's Timetable</div>
      <div id="list"></div>
    </div>

  </div>

</div>

<script>

/* SIMPLE TIMING MODEL */
const schedule = [
{start:8*60+20,end:9*60+15,label:"P1"},
{start:9*60+20,end:10*60+15,label:"P2"},
{start:10*60+35,end:11*60+0,label:"P3"},
{start:11*60,end:11*60+55,label:"P4"},
{start:12*60+50,end:13*60+30,label:"P5"},
{start:13*60+30,end:14*60+25,label:"P6"}
];

/* SUBJECTS (PLACEHOLDER — YOU CAN CHANGE LATER) */
const subjects = {
Mon:["History","Drama","Maths","Design","Science","English"],
Tue:["Design","Design","Soccer","Soccer","English","RS"],
Wed:["History","RS","Maths","Drama","French","French"],
Thu:["Maths","Maths","English","History","Drama","PE"],
Fri:["History","Design","Drama","Science","Music","French"]
};

function getDay(){
  return ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date().getDay()];
}

function update(){
  let now=new Date();
  let mins=now.getHours()*60+now.getMinutes();

  document.getElementById("time").innerText=
    now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

  document.getElementById("date").innerText=
    now.toDateString();

  let current="Free";
  let next="End";
  let left="";

  for(let i=0;i<schedule.length;i++){
    if(mins>=schedule[i].start && mins<=schedule[i].end){
      current=schedule[i].label;
      left=(schedule[i].end-mins)+" min left";
      if(schedule[i+1]) next=schedule[i+1].label;
    }
  }

  document.getElementById("current").innerText=current;
  document.getElementById("next").innerText=next;
  document.getElementById("left").innerText=left;
}

function render(){
  let day=getDay();
  let list=document.getElementById("list");
  list.innerHTML="";

  if(!subjects[day]) return;

  subjects[day].forEach((s,i)=>{
    let div=document.createElement("div");
    div.className="lesson";
    div.innerHTML=`<span>P${i+1} ${s}</span><span>Class</span>`;
    list.appendChild(div);
  });
}

render();
update();
setInterval(update,1000);

</script>

</body>
</html>
