<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>School Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

:root{
  --bg:#0a0a0a;
  --panel:#111;
  --card:#161616;
  --text:#ffffff;
  --muted:#9ca3af;

  --green:#22c55e;
  --pink:#ec4899;
  --blue:#3b82f6;
}

body{
  margin:0;
  font-family:Inter, sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* TOP BAR */
.top{
  padding:20px;
  background:linear-gradient(135deg,#111,#0a0a0a);
  border-bottom:1px solid #222;
}

.time{
  font-size:28px;
  font-weight:700;
}

.date{
  color:var(--muted);
}

/* GRID */
.container{
  padding:20px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.card{
  background:var(--card);
  padding:15px;
  border-radius:15px;
  border:1px solid #222;
}

.title{
  color:var(--green);
  font-weight:700;
}

.big{
  font-size:22px;
  font-weight:700;
}

/* TIMETABLE */
.lesson{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #222;
}

.highlight{
  background:rgba(236,72,153,0.15);
  border-left:3px solid var(--pink);
}

/* BUTTON */
button{
  margin-top:10px;
  padding:10px 12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  background:var(--pink);
  color:white;
  font-weight:600;
}

/* PROGRESS BAR */
.bar{
  width:100%;
  height:10px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.fill{
  height:100%;
  background:linear-gradient(90deg,var(--green),var(--pink));
  width:0%;
}
</style>
</head>

<body>

<div class="top">
  <div class="time" id="time">--:--</div>
  <div class="date" id="date">Loading date...</div>
</div>

<div class="container">

  <div class="card">
    <div class="title">Current Lesson</div>
    <div class="big" id="current">Loading...</div>
    <div id="countdown"></div>
  </div>

  <div class="card">
    <div class="title">Next Lesson</div>
    <div class="big" id="next">---</div>
  </div>

  <div class="card">
    <div class="title">School Progress</div>
    <div class="bar"><div class="fill" id="bar"></div></div>
  </div>

  <div class="card">
    <div class="title">Timetable (Week A)</div>
    <div id="timetable"></div>
  </div>

</div>

<script>

const timetable = [
{start:8*60+45, end:9*60+35, name:"Maths"},
{start:9*60+40, end:10*60+30, name:"English"},
{start:10*60+50, end:11*60+40, name:"Science"},
{start:11*60+45, end:12*60+35, name:"History"},
{start:13*60+15, end:14*60+5, name:"PE"}
];

function updateClock(){
  const now = new Date();

  let h = now.getHours();
  let m = now.getMinutes();

  document.getElementById("time").innerText =
    `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}`;

  document.getElementById("date").innerText =
    now.toDateString();

  let mins = h*60 + m;

  let current = "Free Period";
  let next = "End of day";
  let remaining = "";

  for(let i=0;i<timetable.length;i++){
    if(mins >= timetable[i].start && mins <= timetable[i].end){
      current = timetable[i].name;
      remaining = Math.floor(timetable[i].end - mins) + " min left";
      if(timetable[i+1]) next = timetable[i+1].name;
      break;
    }
  }

  document.getElementById("current").innerText = current;
  document.getElementById("next").innerText = next;
  document.getElementById("countdown").innerText = remaining;

  // progress bar
  let start = 8*60+45;
  let end = 15*60;
  let percent = ((mins-start)/(end-start))*100;
  document.getElementById("bar").style.width = percent + "%";
}

function renderTimetable(){
  let c = document.getElementById("timetable");
  let now = new Date();
  let mins = now.getHours()*60 + now.getMinutes();

  timetable.forEach(t=>{
    let div = document.createElement("div");
    div.className = "lesson";

    if(mins >= t.start && mins <= t.end){
      div.classList.add("highlight");
    }

    div.innerHTML = `
      <div>${t.name}</div>
      <div>${format(t.start)} - ${format(t.end)}</div>
    `;
    c.appendChild(div);
  });
}

function format(m){
  let h = Math.floor(m/60);
  let mm = m%60;
  return `${h.toString().padStart(2,'0')}:${mm.toString().padStart(2,'0')}`;
}

renderTimetable();
updateClock();
setInterval(updateClock,1000);

</script>

</body>
</html>
